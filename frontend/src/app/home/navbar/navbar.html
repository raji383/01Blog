<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top py-2">
  <div class="container-fluid px-4 gap-3">

    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold text-dark" [routerLink]="['/']">
      <div class="bg-primary rounded-2 d-flex align-items-center justify-content-center"
        style="width:28px;height:28px;">
        <i class="bi bi-journal-text text-white"></i>
      </div>
      Blog
    </a>

    <!-- Mobile toggle -->
    <button class="navbar-toggler border ms-auto" type="button" data-bs-toggle="collapse"
      data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Content -->
    <div class="collapse navbar-collapse" id="navbarContent">

      <!-- Search -->
      <div class="mx-auto position-relative">
        <div class="input-group" style="width:240px;">
          <span class="input-group-text bg-light border-0">
            <i class="bi bi-search text-muted" style="font-size:13px;"></i>
          </span>
          <input
            class="form-control bg-light border-0"
            style="font-size:14px;"
            type="search"
            placeholder="Search articles..."
            [(ngModel)]="searchQuery"
            (input)="onSearchInput()" />
        </div>

        <!-- Dropdown results -->
        <div *ngIf="searched && searched.length > 0"
          class="position-absolute bg-white border rounded-3 shadow-sm mt-1 py-1"
          style="width:300px; left:50%; transform:translateX(-50%); z-index:1050; top:100%;">

          <div class="px-3 py-1"
            style="font-size:11px; font-weight:600; color:#888; letter-spacing:0.05em; text-transform:uppercase;">
            Users
          </div>

          <a *ngFor="let user of searched"
            class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none dropdown-item"
            [routerLink]="['/profile', user.id]"
            (click)="searched = null">
            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center flex-shrink-0"
              style="width:28px;height:28px;font-size:12px;font-weight:500;">
              {{ user.username?.charAt(0)?.toUpperCase() }}
            </div>
            <div class="d-flex flex-column">
              <span style="font-size:14px; color:#111;">{{ user.username }}</span>
              <span style="font-size:12px; color:#888;">{{ user.email }}</span>
            </div>
          </a>
        </div>

        <!-- Empty state -->
        <div *ngIf="searched && searched.length === 0"
          class="position-absolute bg-white border rounded-3 shadow-sm mt-1 py-2"
          style="width:300px; left:50%; transform:translateX(-50%); z-index:1050; top:100%;">
          <div class="px-3 py-2 text-center text-muted" style="font-size:14px;">
            No results for "<strong>{{ searchQuery }}</strong>"
          </div>
        </div>
      </div>

      <!-- Right side -->
      <div class="d-flex align-items-center gap-2">

        <!-- Admin -->
        <button *ngIf="isUserAdmin()"
          class="btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center"
          style="width:36px;height:36px;" [routerLink]="['/admin']" title="Dashboard">
          <i class="bi bi-people"></i>
        </button>

        <!-- Notifications -->
        <div class="position-relative" #notificationShell>
          <button class="btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center"
            style="width:36px;height:36px;" (click)="showNotificationBar()">
            <i class="bi bi-bell"></i>
            <span *ngIf="getnotificationCount()"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              style="font-size:10px;">
              {{ getnotificationCount() }}
            </span>
          </button>

          <app-notificationbar *ngIf="showNotifications()" (closed)="closeNotifications()">
          </app-notificationbar>
        </div>

        <!-- Profile -->
        <a class="d-flex align-items-center gap-2 text-decoration-none"
          [routerLink]="['/profile', userProfile()?.id]">
          <div class="rounded-circle bg-primary text-white fw-medium d-flex align-items-center justify-content-center"
            style="width:32px;height:32px;font-size:13px;">
            {{ userProfile()?.username?.charAt(0)?.toUpperCase() }}
          </div>
          <span class="fw-medium text-dark d-none d-md-inline" style="font-size:14px;">
            {{ userProfile()?.username }}
          </span>
        </a>

      </div>
    </div>
  </div>
</nav>
