<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top py-2">
  <div class="container-fluid px-4 gap-3">

    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold text-dark" [routerLink]="['/']">
      <div class="bg-primary rounded-2 d-flex align-items-center justify-content-center"
        style="width:28px;height:28px;">
        <i class="bi bi-journal-text text-white"></i>
      </div>
      Blog
    </a>

    <!-- Mobile toggle -->
    <button class="navbar-toggler border ms-auto" type="button" data-bs-toggle="collapse"
      data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Content -->
    <div class="collapse navbar-collapse" id="navbarContent">

      <!-- Search (centered) -->
      <div class="mx-auto">

      </div>

      <!-- Right side -->
      <div class="d-flex align-items-center gap-2">

        <!-- Admin -->
        <button *ngIf="isUserAdmin()"
          class="btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center"
          style="width:36px;height:36px;" [routerLink]="['/admin']" title="Dashboard">
          <i class="bi bi-people"></i>
        </button>

        <!-- Notifications -->
        <div class="position-relative">
          <button class="btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center"
            style="width:36px;height:36px;" (click)="showNotificationBar()">
            <i class="bi bi-bell"></i>
            <span *ngIf="getnotificationCount()"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              style="font-size:10px;">
              {{ getnotificationCount() }}
            </span>
          </button>

          <app-notificationbar *ngIf="showNotifications()" (closed)="closeNotifications()">
          </app-notificationbar>
        </div>

        <!-- Profile -->
        <a class="d-flex align-items-center gap-2 text-decoration-none" [routerLink]="['/profile', userProfile()?.id]">

          <div class="rounded-circle bg-primary text-white fw-medium
                      d-flex align-items-center justify-content-center" style="width:32px;height:32px;font-size:13px;">
            {{ userProfile()?.username?.charAt(0)?.toUpperCase() }}
          </div>

          <span class="fw-medium text-dark d-none d-md-inline" style="font-size:14px;">
            {{ userProfile()?.username }}
          </span>
        </a>

      </div>
    </div>
  </div>
</nav>
