<div class="post-card" *ngIf="post">
    <!-- Post Header -->
    <div class="post-header">
        <div class="author-info">
            <div class="author-avatar">{{ post.authorUsername.charAt(0).toUpperCase() }}</div>
            <div class="author-details">
                <div class="author-name">{{ post.authorUsername }}</div>
                <div class="post-time">{{ getRelativeTime(post.createdAt) }}</div>
            </div>
        </div>
        <div class="post-options-wrapper">
            <div class="post-options" (click)="showOptionsMenu()">•••</div>
            <div class="post-options-menu" *ngIf="showOptions">
                <app-show-options
                    [post]="post"
                    (closeMenu)="closeOptionsMenu()"
                    (edit)="openEditModal($event)"
                    (delete)="deletePost($event)"
                    (report)="reportPost($event)"></app-show-options>
            </div>
        </div>

    </div>

    <!-- Post Content -->
    <div class="post-content">
        <h3 class="post-title">{{ post.title }}</h3>
        <p class="post-text">{{ post.content }}</p>
    </div>

    <!-- Post Media -->
    <div class="post-media" *ngIf="post.mediaUrl">
        <img *ngIf="!isVideoMedia(post.mediaUrl)" [src]="'http://localhost:8080' + post.mediaUrl" alt="Post media" />
        <video *ngIf="isVideoMedia(post.mediaUrl)" [src]="'http://localhost:8080' + post.mediaUrl" controls playsinline preload="metadata"></video>
    </div>

    <!-- Post Stats -->
    <div class="post-stats">
        <span (click)="addLike(post)">👍 {{ post.likeCount }}</span>
        <span (click)="showComments()">💬 {{ post.commentCount }} Comments</span>
        <!--  <span>↗️ {{ post.shares }} Shares</span> -->
    </div>
    <div class="postcomment" *ngIf="seemore">
        <app-comments [post]="post"></app-comments>
    </div>
    <!-- Post Actions -->

</div>

<app-edit-post
    *ngIf="editingPost"
    [post]="editingPost"
    (cancel)="closeEditModal()"
    (save)="saveEditedPost(editingPost, $event)"></app-edit-post>
