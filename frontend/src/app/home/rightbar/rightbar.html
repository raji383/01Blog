    <!-- 🔥 Profile Card -->
    <div class="card profile-card">
        <div class="profile-header">
            <div class="avatar">
                {{ userProfile()?.username?.charAt(0)?.toUpperCase() }}
            </div>
            <div>
                <h4>{{ userProfile()?.username }}</h4>
                <p>Web Developer</p>
            </div>
            <button class="logout-btn" (click)="logout()">
                Logout
            </button>
        </div>
    </div>
