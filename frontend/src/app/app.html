<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/feed" class="nav-brand">📚 StudentBlog</a>
    <div class="nav-links">
      <a routerLink="/feed" routerLinkActive="active">Feed</a>
      <a routerLink="/profile" routerLinkActive="active">My Profile</a>
      <a routerLink="/create-post" routerLinkActive="active">Create Post</a>
      <a *ngIf="authService.isAdmin()" routerLink="/admin" routerLinkActive="active">Admin</a>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </div>
  </div>
</nav>

<main class="main-content">
  <aside class="sidebar">
    <h3>Menu</h3>
    <a routerLink="/feed" routerLinkActive="active" class="sidebar-item">
      <span class="sidebar-icon">🏠</span>
      <span>Home</span>
    </a>
    <a routerLink="/profile" routerLinkActive="active" class="sidebar-item">
      <span class="sidebar-icon">👤</span>
      <span>Profile</span>
    </a>
    <a routerLink="/create-post" routerLinkActive="active" class="sidebar-item">
      <span class="sidebar-icon">✍️</span>
      <span>Create Post</span>
    </a>
    <a *ngIf="authService.isAdmin()" routerLink="/admin" routerLinkActive="active" class="sidebar-item">
      <span class="sidebar-icon">⚙️</span>
      <span>Admin</span>
    </a>
  </aside>

  <div class="feed">
    <router-outlet></router-outlet>
  </div>

  <aside class="right-sidebar">
    <div class="suggestions-card">
      <h3>Coming Soon</h3>
      <p style="font-size: 12px; color: #65676b; margin: 0;">
        Suggestions and recommendations will appear here
      </p>
    </div>
  </aside>
</main>
