<div class="feed-container">
  <div class="feed">
    <app-add-post (postCreated)="onPostCreated()"></app-add-post>

    
    <!-- Error state -->
    <div *ngIf="error && !isLoading" class="error">{{ error }}</div>

    <app-post *ngFor="let post of posts" [post]="post"></app-post>

    <div *ngIf="!isLoading && !error && posts.length === 0" class="empty-state">No posts yet.</div>
  </div>
</div>
