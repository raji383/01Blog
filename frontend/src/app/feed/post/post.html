<article class="post">
  <!-- Header -->
  <div class="post-header">
    <div class="author-info">
      <div class="avatar">
        {{ post.authorUsername?.charAt(0) }}
      </div>

      <div class="author-details">
        <h3 class="author-name">{{ post.authorUsername }}</h3>
        <p class="timestamp">
          {{ post.createdAt | date:'short' }}
        </p>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="post-content">
    <p class="text">{{ post.content }}</p>

    <img
      *ngIf="post.mediaUrl"
      [src]="post.mediaUrl"
      class="post-image"
    />
  </div>

  <!-- Stats -->
  <div class="engagement-stats">
    <span class="stat">{{ post.likeCount }} likes</span>
    <span class="stat">{{ post.commentCount }} comments</span>
  </div>

  <!-- Buttons -->
  <div class="engagement-buttons">
    <button class="btn-engage">
      ❤️ Like
    </button>

    <button class="btn-engage">
      💬 Comment
    </button>
  </div>
</article>
