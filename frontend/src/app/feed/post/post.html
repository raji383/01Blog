<article class="post">
  <!-- Post Header -->
  <div class="post-header">
    <div class="author-info">
      <div class="avatar">{{ post.avatar }}</div>
      <div class="author-details">
        <h3 class="author-name">{{ post.author }}</h3>
        <p class="author-role" *ngIf="post.role">{{ post.role }}</p>
        <p class="timestamp">{{ post.timestamp }}</p>
      </div>
    </div>
    <button class="menu-btn" aria-label="More options">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
      </svg>
    </button>
  </div>

  <!-- Post Content -->
  <div class="post-content">
    <p class="text">{{ post.content }}</p>
    <img *ngIf="post.image" [src]="post.image" alt="Post image" class="post-image" />
  </div>

  <!-- Engagement Stats -->
  <div class="engagement-stats">
    <span class="stat">{{ likes() }} likes</span>
    <span class="stat">{{ post.comments.length }} comments</span>
  </div>

  <!-- Engagement Buttons -->
  <div class="engagement-buttons">
    <button
      class="btn-engage"
      [class.liked]="liked()"
      (click)="toggleLike()"
      aria-label="Like this post"
    >
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Like</span>
    </button>

    <button class="btn-engage" (click)="toggleComments()" aria-label="Comment on this post">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v14l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
      <span>Comment</span>
    </button>

    <button class="btn-engage" aria-label="Share this post">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.44 9.31 6.77 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.77 0 1.44-.3 1.96-.77l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
      </svg>
      <span>Share</span>
    </button>
  </div>

  <!-- Comments Section -->
  <div class="comments-section" *ngIf="showComments()">
    <!-- Comment Input -->
    <div class="comment-input-area">
      <div class="avatar small">Y</div>
      <div class="input-wrapper">
        <input
          type="text"
          [ngModel]="newComment()"
          (ngModelChange)="newComment.set($event)"
          (keyup.enter)="addComment()"
          placeholder="Add a comment…"
          class="comment-input"
          aria-label="Add a comment"
        />
        <button
          *ngIf="newComment().trim()"
          (click)="addComment()"
          class="post-btn"
          aria-label="Post comment"
        >
          Post
        </button>
      </div>
    </div>

    <!-- Comments List -->
    <div class="comments-list" *ngIf="post.comments && post.comments.length">
      <div class="comment" *ngFor="let comment of post.comments">
        <div class="avatar small">{{ comment.avatar }}</div>
        <div class="comment-body">
          <div class="comment-header">
            <h4 class="comment-author">{{ comment.author }}</h4>
            <span class="comment-time">{{ comment.timestamp }}</span>
          </div>
          <p class="comment-text">{{ comment.text }}</p>
        </div>
      </div>
    </div>
  </div>
</article>
