spring.application.name=demo
# Default in-memory H2 datasource for local development
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JWT settings
jwt.secret=replace_this_with_a_strong_secret_of_at_least_32_chars_change_me
jwt.expirationMs=3600000
